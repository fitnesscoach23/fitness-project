server:
  port: ${SERVER_PORT:8086}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/coach_billing}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    connect-retries: ${FLYWAY_CONNECT_RETRIES:10}

jwt:
  secret: ${JWT_SECRET:YOhVIILWnA9ZCbUShsWIzqlVpDhpKEaYGAAjnplCmU4=}

razorpay:
  key-id: ${RAZORPAY_KEY_ID:}
  key-secret: ${RAZORPAY_KEY_SECRET:}

webhook:
  secret: ${WEBHOOK_SECRET:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
