server:
  port: ${SERVER_PORT:8087}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/coach_notification}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: ${FLYWAY_CONNECT_RETRIES:10}
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:YOhVIILWnA9ZCbUShsWIzqlVpDhpKEaYGAAjnplCmU4=}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

whatsapp:
  mode: ${WHATSAPP_MODE:mock}
  api-base-url: ${WHATSAPP_API_BASE_URL:https://graph.facebook.com/v25.0}
  phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
  access-token: ${WHATSAPP_ACCESS_TOKEN:}
  template-name: ${WHATSAPP_TEMPLATE_NAME:}
  template-language-code: ${WHATSAPP_TEMPLATE_LANGUAGE_CODE:en_US}
  payment-reminder-template-name: ${WHATSAPP_PAYMENT_REMINDER_TEMPLATE_NAME:}
  checkin-reminder-template-name: ${WHATSAPP_CHECKIN_REMINDER_TEMPLATE_NAME:}
  progress-comparison-template-name: ${WHATSAPP_PROGRESS_COMPARISON_TEMPLATE_NAME:}
  consistency-report-template-name: ${WHATSAPP_CONSISTENCY_REPORT_TEMPLATE_NAME:}
  workout-plan-template-name: ${WHATSAPP_WORKOUT_PLAN_TEMPLATE_NAME:}
  diet-plan-template-name: ${WHATSAPP_DIET_PLAN_TEMPLATE_NAME:}

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
