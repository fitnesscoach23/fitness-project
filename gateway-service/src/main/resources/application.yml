server:
  port: ${SERVER_PORT:8080}

spring:
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_FIRST
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:

        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/auth/**

        - id: member-service
          uri: ${MEMBER_SERVICE_URL:http://member-service:8082}
          predicates:
            - Path=/members/**

        - id: diet-review-service
          uri: ${DIET_REVIEW_SERVICE_URL:http://diet-review:8088}
          predicates:
            - Path=/diet/review

        - id: diet-service
          uri: ${DIET_SERVICE_URL:http://diet-service:8084}
          predicates:
            - Path=/diet/**

        - id: diet-library-service
          uri: ${DIET_SERVICE_URL:http://diet-service:8084}
          predicates:
            - Path=/diet-library/**

        - id: workout-service
          uri: ${WORKOUT_SERVICE_URL:http://workout-service:8083}
          predicates:
            - Path=/workouts/**

        - id: exercise-library-service
          uri: ${WORKOUT_SERVICE_URL:http://workout-service:8083}
          predicates:
            - Path=/exercise-library/**

        - id: billing-service
          uri: ${BILLING_SERVICE_URL:http://billing-service:8086}
          predicates:
            - Path=/billing/**

        - id: checkin-service
          uri: ${CHECKIN_SERVICE_URL:http://checkin-service:8085}
          predicates:
            - Path=/checkins/**

        - id: checkin-photo-service
          uri: ${CHECKIN_SERVICE_URL:http://checkin-service:8085}
          predicates:
            - Path=/checkin/**

        - id: progress-checkin-service
          uri: ${CHECKIN_SERVICE_URL:http://checkin-service:8085}
          predicates:
            - Path=/progress/**

        - id: daily-checkin-service
          uri: ${CHECKIN_SERVICE_URL:http://checkin-service:8085}
          predicates:
            - Path=/daily-checkins/**

        - id: notification-service
          uri: ${NOTIFICATION_SERVICE_URL:http://notification-service:8087}
          predicates:
            - Path=/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
