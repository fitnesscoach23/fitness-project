server:
  port: ${SERVER_PORT:8085}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/coach_checkin}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:3}
      minimum-idle: ${DB_MIN_IDLE:1}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:30000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:600000}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    connect-retries: ${FLYWAY_CONNECT_RETRIES:10}

jwt:
  secret: ${JWT_SECRET:YOhVIILWnA9ZCbUShsWIzqlVpDhpKEaYGAAjnplCmU4=}

storage:
  provider: ${STORAGE_PROVIDER:filesystem}
  photos-dir: ${PHOTOS_DIR:./checkin-photos}
  s3:
    bucket: ${S3_BUCKET:}
    region: ${AWS_REGION:ap-south-1}
    key-prefix: ${S3_KEY_PREFIX:checkin-photos/}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

